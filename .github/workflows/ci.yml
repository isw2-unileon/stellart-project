name: Stellart CI

# El trigger: CUÁNDO se ejecuta el workflow (al hacer push o PR a main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Le decimos al robot dónde está nuestro código de React
defaults:
  run:
    working-directory: ./frontend/stellart-frontend

# Los jobs: agrupaciones de pasos que corren en una máquina virtual
jobs:
  # JOB 1: Linter (Falla rápido si hay errores de sintaxis)
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/stellart-frontend/package-lock.json
      - run: npm install
      - run: npm run lint

  # JOB 2: Tests y Build (Corre en paralelo al Job 1)
  test-and-build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/stellart-frontend/package-lock.json
      - run: npm install
      - run: npm run test
      - run: npm run build