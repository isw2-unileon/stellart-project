<!DOCTYPE html>
<html lang="en">
<head>

    <title>Register</title>
</head>
<body>
    <body>
    <form method="POST" action="/register"> 
        <label>Nombre:</label>
        <input type="text" name="nombre" required>

    </form> </body>
